version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vaultos_db
    environment:
      POSTGRES_USER: vaultos
      POSTGRES_PASSWORD: vaultos_secret!!!!!!!!!
      POSTGRES_DB: vaultos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vaultos_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: