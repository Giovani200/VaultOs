<link rel="stylesheet" href="styles.css" />
<style>
  /* Bottom screen switcher */
  .screen-switcher {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 1000;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 5px 5px 16px;
    background: rgba(0,26,44,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    box-shadow: 0 12px 32px -8px rgba(0,26,44,0.4);
    font-family: 'Inter', sans-serif;
  }
  .ss-label {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    padding-right: 8px;
    border-right: 1px solid rgba(255,255,255,0.08);
    margin-right: 4px;
  }
  .ss-btn {
    padding: 7px 14px;
    font-size: 12px; font-weight: 500;
    color: rgba(255,255,255,0.65);
    border-radius: 999px;
    transition: all 0.15s;
    border: none; background: none; cursor: pointer;
    font-family: inherit;
  }
  .ss-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }
  .ss-btn--active {
    background: #1FBBA6; color: #001A2C; font-weight: 600;
  }
</style>
</head>
